<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta http-equiv="Cache-Control" content="no-cache">
<meta name="viewport" content="width=device-width">
<script type="text/javascript">
function test01() {
    if (typeof DigitalCredential != "undefined") {
        alert("Digital Credentials API is supported.");
    } else {
        alert("Digital Credentials API is not supported.");
    }
}

function test02() {
    if (DigitalCredential.userAgentAllowsProtocol("example-protocol")) {
        alert("DC API supported.");
    } else {
        alert("DC API not supported.");
    }
}
    
function test03() {
    const protocols = [
      "example-issuance-protocol",
      "another-issuance-protocol"
    ];
    const supportedProtocols = protocols.filter(DigitalCredential.userAgentAllowsProtocol);
    if (supportedProtocols.length > 0) {
        alert("At least one protocol is supported. Proceed with issuance.");
    } else {
        alert("No protocols are supported. Fall back to a different issuance method.");
    }
}

    
</script>
</head>
<body>
    <h1>Digital Credentials API</h1>
    <h3>Example 1</h3>
    <input type="button" value="Test01" onclick="test01()">
    <h3>Example 2</h3>
    <input type="button" value="Test02" onclick="test02()">
    <h3>Example 3</h3>
    <input type="button" value="Test03" onclick="test03()">
    <h3>Example 4</h3>
    <button>Verify Identity</button>
    <script>
      const button = document.querySelector("button");
      button.addEventListener("click", async () => {
        const protocol = "example-request-protocol";
        // Check for DC API and protocol support
        if (!DigitalCredential.userAgentAllowsProtocol(protocol)) {
          // The browser doesn't allow the use of this protocol.
          // Fall back to a different verification method.
          showTraditionalVerificationForm();
          return;
        }
        try {
          const credential = await navigator.credentials.get({
            digital: {
              requests: [{
                protocol,
                data: { /* request data */ }
              }]
            }
          });

          // Post it back to the verifier server for decryption and verification
          const response = await fetch("/verify-credential", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(credential)
          });

          // Check response
          if (!response.ok) {
            throw new Error("Failed to verify credential");
          }

          // Render the verification result
          displayVerificationResult(await response.json());

        } catch (error) {
          console.error("Error requesting digital credential:", error);
        }
      });
    </script>
        
        
        
        
</body>
</html>
