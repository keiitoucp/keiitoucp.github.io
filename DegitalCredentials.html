<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta http-equiv="Cache-Control" content="no-cache">
<meta name="viewport" content="width=device-width">
<script type="text/javascript">
function test01() {
    if (typeof DigitalCredential != "undefined") {
        alert("Digital Credentials API is supported.");
    } else {
        alert("Digital Credentials API is not supported.");
    }
}

function test02() {
    if (DigitalCredential.userAgentAllowsProtocol("openid4vp")) {
        alert("DC API supported.");
    } else {
        alert("DC API not supported.");
    }
}

    
</script>
</head>
<body>
<h1>Digital Credentials API</h1>
<h3>Example 1</h3>
<input type="button" value="Test01" onclick="test01()">
<h3>Example 2-01</h3>
<input type="button" value="Test02" onclick="test02()">
</body>
</html>
